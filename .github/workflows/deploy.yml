name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 15 * * 1' # Every Monday at 3pm UTC
  workflow_dispatch:
    inputs:
      full_fetch:
        description: 'Force full re-fetch (ignore cursors)'
        type: boolean
        default: false
      skip_guard:
        description: 'Skip deploy guard'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/books.db
          key: books-db-${{ github.run_id }}
          restore-keys: books-db-

      - run: npm ci

      - name: Run pipeline
        run: npm run pipeline:build -- ${{ inputs.full_fetch && '--full' || '' }} ${{ inputs.skip_guard && '--skip-guard' || '' }}
        env:
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}

      - name: Build site
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
